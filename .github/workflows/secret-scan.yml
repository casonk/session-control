name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pre-commit
        run: python -m pip install pre-commit

      - name: Run Gitleaks
        run: pre-commit run gitleaks --all-files
