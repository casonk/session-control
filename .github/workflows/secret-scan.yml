name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >-
            ${{ github.event_name == 'schedule'
              && '--log-opts --all --baseline-path .gitleaks-baseline.json'
              || '' }}
